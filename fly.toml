[app]
  name = "agent-tracker-dashboard"
  primary_region = "lhr"

[build]

[env]
  PORT = "3000"
  SESSION_TTL_MINUTES = "5"
  DB_DIR = "/app/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[mounts]
  source = "agent_data"
  destination = "/app/data"
